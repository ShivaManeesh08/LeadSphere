services:
  # ─── Backend: Node.js Web Service ──────────────────────────────────────────
  - type: web
    name: leadsphere-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # ─── Frontend: Static Site ──────────────────────────────────────────────────
  - type: web
    name: leadsphere-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: leadsphere-api
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
        # After deployment, set this to: https://leadsphere-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
